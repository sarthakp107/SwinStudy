name: Deploy Backend via Bastion

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.BACK_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts

          echo 'Host backend-server' >> ~/.ssh/config
          echo "  HostName ${{ secrets.BACK_HOST }}" >> ~/.ssh/config
          echo "  User ${{ secrets.BACK_USER }}" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_ed25519" >> ~/.ssh/config
          echo "  ProxyJump ${{ secrets.BACK_USER }}@${{ secrets.BASTION_HOST }}" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: SSH into backend and deploy
        shell: bash
        run: |
          ssh backend-server <<'EOF'
            cd /var/SwinStudy
            git pull origin development
            cd Backend
            npm install
            npm run build
            pm2 restart backend || pm2 start dist/server.js --name backend
          EOF



